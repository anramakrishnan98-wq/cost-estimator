<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
</head>
<body style="text-align:center; font-family:Arial; background:#f5f5f5;">

<h1>📊 Admin Dashboard</h1>
<a href="/">⬅ Back to Calculator</a>

<table border="1" style="margin:auto; background:white;">
<tr>
    <th>ID</th>
    <th>Area</th>
    <th>Floors</th>
    <th>Location</th>
    <th>Total</th>
    <th>PDF</th>
</tr>

{% for row in data %}
<tr>
    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
    <td>{{ row[3] }}</td>
    <td>{{ row[4] }}</td>
    <td><a href="/download/{{ row[0] }}">Download</a></td>
</tr>
{% endfor %}

</table>

<br>
<a href="/">? Back to Calculator</a>

</body>
</html>
